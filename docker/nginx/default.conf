server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 20m;

    # Docker embedded DNS — lets nginx re-resolve upstreams when containers restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Frontend (Next.js) proxied under / (same-origin cookies).
    location / {
        set $upstream_frontend frontend:3000;
        proxy_pass http://$upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Laravel API + Sanctum CSRF cookie endpoint.
    location ~ ^/(api|sanctum)(/|$) {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Laravel health + horizon + telescope.
    location ~ ^/(up|horizon|telescope) {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # SSE-friendly FastCGI for the AI chat endpoint (no buffering, long timeout).
    location ~ ^/api/v1/chat {
        include fastcgi_params;
        set $upstream_app app:9000;
        fastcgi_pass $upstream_app;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_buffering off;
        fastcgi_read_timeout 300s;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ \.php$ {
        set $upstream_app app:9000;
        fastcgi_pass $upstream_app;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
