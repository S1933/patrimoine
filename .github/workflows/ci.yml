name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: patrimoine_test
          POSTGRES_USER: patrimoine
          POSTGRES_PASSWORD: patrimoine
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, pgsql, mbstring, bcmath
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Pint (style)
        run: ./vendor/bin/pint --test

      - name: PHPStan / Larastan
        run: ./vendor/bin/phpstan analyse --configuration=phpstan.neon --no-progress --error-format=github || true

      - name: Tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: patrimoine_test
          DB_USERNAME: patrimoine
          DB_PASSWORD: patrimoine
          AUTH_BYPASS: false
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
        run: php artisan test

  frontend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=0 || true

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
