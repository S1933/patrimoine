name: patrimoine

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: patrimoine-app
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/patrimoine.ini:ro
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-patrimoine}
      DB_USERNAME: ${DB_USERNAME:-patrimoine}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [patrimoine-net]
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: patrimoine-nginx
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - app
      - frontend
    networks: [patrimoine-net]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: patrimoine-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-patrimoine}
      POSTGRES_USER: ${DB_USERNAME:-patrimoine}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-patrimoine} -d ${DB_DATABASE:-patrimoine}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [patrimoine-net]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: patrimoine-redis
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [patrimoine-net]
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: patrimoine-scheduler
    working_dir: /var/www/html
    command: >
      sh -c "php artisan schedule:work --verbose &
             php artisan queue:work --tries=3 --backoff=60 --max-time=3600"
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/patrimoine.ini:ro
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-patrimoine}
      DB_USERNAME: ${DB_USERNAME:-patrimoine}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [patrimoine-net]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: patrimoine-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -p 3000 -H 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_AUTH_BYPASS: "${NEXT_PUBLIC_AUTH_BYPASS:-false}"
    networks: [patrimoine-net]
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: patrimoine-mailpit
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks: [patrimoine-net]
    restart: unless-stopped

networks:
  patrimoine-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
